name: Build TDLib

on:
    workflow_dispatch:
    workflow_call:

env:
    TDLIB_VERSION: "1.8.61"
    TDLIB_COMMIT: 6d509061574d684117f74133056aa43df89022fc
    OPENSSL_VERSION: "3.6.1"

jobs:
    build-linux:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                    - os: ubuntu-24.04-arm
        runs-on: ${{ matrix.os }}
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-linux-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
            - name: Setup ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                create-symlink: true
                key: ccache-linux-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: .ccache
                  CCACHE_MAXSIZE: 512M
              run: |
                  sudo apt-get update
                  sudo apt-get -y upgrade
                  sudo apt-get install make git zlib1g-dev libssl-dev gperf php-cli cmake clang-18 libc++-18-dev libc++abi-18-dev
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  rm -rf build
                  mkdir build
                  cd build
                  CXXFLAGS="-stdlib=libc++" \
                  CC=/usr/bin/clang-18 \
                  CXX=/usr/bin/clang++-18 \
                  cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    ..
                  cmake --build . --target install --parallel
            - name: Copy OpenSSL and zlib static libraries
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  cp /usr/lib/*/libssl.a ./td/tdlib/lib/ || cp /usr/lib/libssl.a ./td/tdlib/lib/ || true
                  cp /usr/lib/*/libcrypto.a ./td/tdlib/lib/ || cp /usr/lib/libcrypto.a ./td/tdlib/lib/ || true
                  cp /usr/lib/*/libz.a ./td/tdlib/lib/ || cp /usr/lib/libz.a ./td/tdlib/lib/ || true
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true

    build-macos:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest # arm64 (M1)
                    - os: macos-26-intel # Intel # macos-13
        runs-on: ${{ matrix.os }}
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-macos-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
            - name: Setup ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                create-symlink: true
                key: ccache-macos-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: .ccache
                  CCACHE_MAXSIZE: 512M
              run: |
                  /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
                  brew install gperf openssl zlib
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  rm -rf build
                  mkdir build
                  cd build
                  OPENSSL_DIR=$(brew --prefix openssl)
                  ZLIB_DIR=$(brew --prefix zlib)
                  cmake -G Ninja \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DOPENSSL_ROOT_DIR=$OPENSSL_DIR \
                    -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    ..
                  cmake --build . --target install --parallel
            - name: Copy OpenSSL and zlib static libraries
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  OPENSSL_DIR=$(brew --prefix openssl)
                  ZLIB_DIR=$(brew --prefix zlib)
                  # Copy OpenSSL and zlib static libraries
                  cp $OPENSSL_DIR/lib/libssl.a ./td/tdlib/lib/ || true
                  cp $OPENSSL_DIR/lib/libcrypto.a ./td/tdlib/lib/ || true
                  cp $ZLIB_DIR/lib/libz.a ./td/tdlib/lib/ || true
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true

    build-windows:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                    - os: windows-11-arm
        runs-on: ${{ matrix.os }}
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-windows-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
            - name: Setup ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                key: ccache-windows-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
            - name: Set up MSVC Developer Command Prompt
              uses: ilammy/msvc-dev-cmd@v1
              with:
                arch: ${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: .ccache
                  CCACHE_MAXSIZE: 512M
                  CCACHE_CPP2: "yes"
                  CCACHE_SLOPPINESS: time_macros
                  VCPKG_ROOT: "C:\\vcpkg"
                  MSYS_NO_PATHCONV: "1"
              run: |
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  if [[ "$RUNNER_ARCH" == "X64" ]]; then
                    CMAKE_ARCH="x64"
                  elif [[ "$RUNNER_ARCH" == "ARM64" ]]; then
                    CMAKE_ARCH="arm64"
                  else
                    echo "Unsupported architecture: $RUNNER_ARCH"
                    exit 1
                  fi
                  VCPKG_TRIPLET_STATIC="${CMAKE_ARCH}-windows-static-release"
                  VCPKG_TRIPLET_DYNAMIC="${CMAKE_ARCH}-windows-release"
                  cat << EOF > "${VCPKG_ROOT}/triplets/community/${CMAKE_ARCH}-windows-release.cmake"
                  set(VCPKG_TARGET_ARCHITECTURE ${CMAKE_ARCH})
                  set(VCPKG_CRT_LINKAGE dynamic)
                  set(VCPKG_LIBRARY_LINKAGE dynamic)
                  set(VCPKG_BUILD_TYPE release)
                  EOF
                  vcpkg install gperf:$VCPKG_TRIPLET_DYNAMIC gperf:$VCPKG_TRIPLET_STATIC
                  vcpkg install openssl:$VCPKG_TRIPLET_DYNAMIC zlib:$VCPKG_TRIPLET_DYNAMIC
                  vcpkg install openssl:$VCPKG_TRIPLET_STATIC zlib:$VCPKG_TRIPLET_STATIC

                  # Build
                  mkdir build-dynamic
                  cd build-dynamic
                  cmake -G Ninja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                      -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                      -DCMAKE_C_FLAGS="/GR- /W4" \
                      -DCMAKE_CXX_FLAGS="/GR- /W4" \
                      -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                      -DCMAKE_TOOLCHAIN_FILE:FILEPATH="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
                      -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET_DYNAMIC" \
                      ..
                  cmake --build . --target install --parallel --config Release
                  cd ..
                  rm -rf build-dynamic
                  mv tdlib/lib/tdjson.lib ./tdjson_dynamic.lib
                  rm -rf tdlib/include tdlib/lib
                  mkdir build-static
                  cd build-static
                  cmake -G Ninja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                      -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                      -DCMAKE_C_FLAGS="/GR- /W4" \
                      -DCMAKE_CXX_FLAGS="/GR- /W4" \
                      -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                      -DCMAKE_TOOLCHAIN_FILE:FILEPATH="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
                      -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET_STATIC" \
                      ..
                  cmake --build . --target install --parallel --config Release
                  cd ..
                  mv ./tdjson_dynamic.lib tdlib/lib/tdjson.lib
                  # Copy dependencies to lib
                  cp "${VCPKG_ROOT}/installed/$VCPKG_TRIPLET_STATIC/lib/"* tdlib/lib/ 2>/dev/null || true
                  cp "${VCPKG_ROOT}/installed/$VCPKG_TRIPLET_DYNAMIC/bin/"*.dll tdlib/bin/ 2>/dev/null || true
              shell: bash
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: ./td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true

    build-android:
        strategy:
            fail-fast: false
            matrix:
                abi: [aarch64, x86_64]
        runs-on: ubuntu-latest
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-android-${{ matrix.abi }}
            - name: Setup ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                create-symlink: true
                key: ccache-android-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
            - name: Setup Android NDK
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  # Install NDK r27d (27.3.13750724) for reproducible builds
                  echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.3.13750724"
                  echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> $GITHUB_ENV
                  echo "ANDROID_API=29" >> $GITHUB_ENV
                  echo "NDK_TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
                  case "${{ matrix.abi }}" in
                    aarch64)
                      echo "OPENSSL_TARGET=android-arm64" >> $GITHUB_ENV
                      echo "ANDROID_ABI=arm64-v8a" >> $GITHUB_ENV
                      ;;
                    x86_64)
                      echo "OPENSSL_TARGET=android-x86_64" >> $GITHUB_ENV
                      echo "ANDROID_ABI=x86_64" >> $GITHUB_ENV
                      ;;
                  esac
            - name: Build static openssl for Android
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  wget -q https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz
                  tar -xzf openssl-${{ env.OPENSSL_VERSION }}.tar.gz
                  cd openssl-${{ env.OPENSSL_VERSION }}
                  export PATH=$NDK_TOOLCHAIN/bin:$PATH
                  ./Configure $OPENSSL_TARGET no-shared no-tests \
                    --prefix=$(pwd)/openssl-install
                  make -j$(nproc)
                  make install_sw
                  echo "OPENSSL_ROOT_DIR=$(pwd)/openssl-install" >> $GITHUB_ENV
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: .ccache
                  CCACHE_MAXSIZE: 512M
              run: |
                  sudo apt-get update
                  sudo apt-get -y upgrade
                  sudo apt-get install make git zlib1g-dev libssl-dev gperf php-cli
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  # Generate auto-generated files using native host build before cross-compiling
                  mkdir native_build
                  cd native_build
                  env -u OPENSSL_ROOT_DIR cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
                  cmake --build . --target prepare_cross_compiling --parallel
                  cd ..
                  rm -rf build
                  mkdir build
                  cd build
                  cmake -G Ninja -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
                    -DANDROID_ABI=$ANDROID_ABI \
                    -DANDROID_PLATFORM=android-$ANDROID_API \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                    -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR \
                    -DOPENSSL_INCLUDE_DIR=$OPENSSL_ROOT_DIR/include \
                    -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_ROOT_DIR/lib/libcrypto.a \
                    -DOPENSSL_SSL_LIBRARY=$OPENSSL_ROOT_DIR/lib/libssl.a \
                    -DTD_ENABLE_JNI=ON \
                    ..
                  cmake --build . --target install/strip --parallel
            - name: Copy OpenSSL and zlib static libraries
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  mkdir -p ./td/tdlib/lib
                  cp $OPENSSL_ROOT_DIR/lib/libssl.a ./td/tdlib/lib/
                  cp $OPENSSL_ROOT_DIR/lib/libcrypto.a ./td/tdlib/lib/
                  cp $NDK_TOOLCHAIN/sysroot/usr/lib/${{ matrix.abi }}-linux-android/libz.a ./td/tdlib/lib/
            - name: Strip Android artifacts
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  STRIP_TOOL="$NDK_TOOLCHAIN/bin/llvm-strip"
                  if [ ! -x "$STRIP_TOOL" ]; then
                    echo "strip tool not found: $STRIP_TOOL"
                    exit 1
                  fi

                  # Reduce size of shared objects while preserving runtime-required symbols.
                  find ./td/tdlib -type f \( -name "*.so" -o -name "*.so.*" \) -print0 | while IFS= read -r -d '' file; do
                    "$STRIP_TOOL" --strip-unneeded "$file" || true
                  done

                  # Remove debug symbols from static libraries to keep both static and dynamic packages smaller.
                  find ./td/tdlib -type f -name "*.a" -print0 | while IFS= read -r -d '' file; do
                    "$STRIP_TOOL" -g "$file" || true
                  done
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true
