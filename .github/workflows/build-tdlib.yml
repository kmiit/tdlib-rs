name: Build TDLib

on:
    workflow_dispatch:
    workflow_call:

env:
    TDLIB_VERSION: "1.8.61"
    TDLIB_COMMIT: 6d509061574d684117f74133056aa43df89022fc
    OPENSSL_VERSION: "3.6.1"
    ZLIB_VERSION: "1.3.2"

jobs:
    build-linux:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                    - os: ubuntu-24.04-arm
        runs-on: ${{ matrix.os }}
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-linux-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
            - name: Restore ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: actions/cache/restore@v4
              with:
                  path: .ccache/
                  key: ccache-linux-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
                  restore-keys: |
                      ccache-linux-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: ${{ github.workspace }}/.ccache
                  CCACHE_MAXSIZE: 512M
              run: |
                  sudo apt-get update
                  sudo apt-get -y upgrade
                  sudo apt-get install make git zlib1g-dev libssl-dev gperf php-cli cmake clang-18 libc++-18-dev libc++abi-18-dev ninja-build ccache
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  rm -rf build
                  mkdir build
                  cd build
                  CXXFLAGS="-stdlib=libc++" CC=/usr/bin/clang-18 CXX=/usr/bin/clang++-18 cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../tdlib -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ..
                  cmake --build . --target install --parallel
            - name: Copy OpenSSL and zlib static libraries
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  mkdir -p ./td/tdlib/lib
                  # Copy static libraries
                  cp /usr/lib/*/libssl.a ./td/tdlib/lib/ || cp /usr/lib/libssl.a ./td/tdlib/lib/ || true
                  cp /usr/lib/*/libcrypto.a ./td/tdlib/lib/ || cp /usr/lib/libcrypto.a ./td/tdlib/lib/ || true
                  cp /usr/lib/*/libz.a ./td/tdlib/lib/ || cp /usr/lib/libz.a ./td/tdlib/lib/ || true
            - name: Save ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && always()
              uses: actions/cache/save@v4
              with:
                  path: .ccache/
                  key: ccache-linux-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true

    build-macos:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-14 # arm64 (M1)
                    - os: macos-15-intel # Intel # macos-13
        runs-on: ${{ matrix.os }}
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-macos-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
            - name: Restore ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: actions/cache/restore@v4
              with:
                  path: .ccache/
                  key: ccache-macos-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
                  restore-keys: |
                      ccache-macos-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: ${{ github.workspace }}/.ccache
                  CCACHE_MAXSIZE: 512M
              run: |
                  /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
                  brew install gperf openssl zlib ninja ccache
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  rm -rf build
                  mkdir build
                  cd build
                  OPENSSL_DIR=$(brew --prefix openssl)
                  ZLIB_DIR=$(brew --prefix zlib)
                  cmake \
                    -G Ninja \
                    -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DOPENSSL_ROOT_DIR=$OPENSSL_DIR \
                    -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    ..
                  cmake --build . --target install --parallel
            - name: Copy OpenSSL and zlib static libraries
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  mkdir -p ./td/tdlib/lib
                  OPENSSL_DIR=$(brew --prefix openssl)
                  ZLIB_DIR=$(brew --prefix zlib)
                  # Copy OpenSSL and zlib static libraries
                  cp $OPENSSL_DIR/lib/libssl.a ./td/tdlib/lib/ || true
                  cp $OPENSSL_DIR/lib/libcrypto.a ./td/tdlib/lib/ || true
                  cp $ZLIB_DIR/lib/libz.a ./td/tdlib/lib/ || true
            - name: Save ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && always()
              uses: actions/cache/save@v4
              with:
                  path: .ccache/
                  key: ccache-macos-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true

    build-windows:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                    - os: windows-11-arm
        runs-on: ${{ matrix.os }}
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-windows-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
            - name: Set up MSVC developer environment
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: ${{ runner.arch == 'ARM64' && 'arm64' || 'amd64' }}
            - name: Restore ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: actions/cache/restore@v4
              with:
                  path: .ccache/
                  key: ccache-windows-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
                  restore-keys: |
                      ccache-windows-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: ${{ github.workspace }}/.ccache
                  CCACHE_MAXSIZE: 512M
                  CCACHE_CPP2: "yes"
                  CCACHE_SLOPPINESS: time_macros
                  # ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN are provided automatically
                  # by GitHub Actions and are used by vcpkg's x-gha binary cache backend.
                  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
              run: |
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  git clone https://github.com/Microsoft/vcpkg.git
                  cd vcpkg
                  if [[ "$RUNNER_ARCH" == "X64" ]]; then
                    git checkout bc3512a509f9d29b37346a7e7e929f9a26e66c7e
                    ./bootstrap-vcpkg.bat
                    # Install both static and dynamic versions
                    ./vcpkg.exe install gperf:x64-windows-static openssl:x64-windows-static zlib:x64-windows-static
                    ./vcpkg.exe install gperf:x64-windows openssl:x64-windows zlib:x64-windows
                    CMAKE_ARCH="x64"
                    VCPKG_TRIPLET_STATIC="x64-windows-static"
                    VCPKG_TRIPLET_DYNAMIC="x64-windows"
                  elif [[ "$RUNNER_ARCH" == "ARM64" ]]; then
                    ./bootstrap-vcpkg.bat
                    # Install both static and dynamic versions
                    ./vcpkg.exe install gperf:arm64-windows-static openssl:arm64-windows-static zlib:arm64-windows-static
                    ./vcpkg.exe install gperf:arm64-windows openssl:arm64-windows zlib:arm64-windows
                    CMAKE_ARCH="ARM64"
                    VCPKG_TRIPLET_STATIC="arm64-windows-static"
                    VCPKG_TRIPLET_DYNAMIC="arm64-windows"
                  else
                    echo "Unsupported architecture: $RUNNER_ARCH"
                    exit 1
                  fi
                  cd ..
                  
                  # Install Ninja and ccache
                  choco install ninja ccache -y
                  
                  # Build static version
                  rm -rf build
                  mkdir build
                  cd build
                  cmake -G Ninja -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX:PATH=../tdlib-static -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET_STATIC" -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_FLAGS="/w" -DCMAKE_CXX_FLAGS="/w" ..
                  cmake --build . --target install --parallel
                  cd ..

                  # Build dynamic version
                  rm -rf build
                  mkdir build
                  cd build
                  cmake -G Ninja -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX:PATH=../tdlib-dynamic -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET_DYNAMIC" -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_FLAGS="/w" -DCMAKE_CXX_FLAGS="/w" ..
                  cmake --build . --target install --parallel
                  cd ..
                  
                  # Merge both versions into tdlib directory
                  mkdir -p tdlib/lib/static
                  mkdir -p tdlib/bin
                  mkdir -p tdlib/include
                  # Copy headers (same from both)
                  cp -r tdlib-static/include/* tdlib/include/
                  # Copy static libraries to lib/static subdirectory
                  cp -r tdlib-static/lib/* tdlib/lib/static/ || true
                  # Copy dynamic version import libraries to lib
                  cp -r tdlib-dynamic/lib/* tdlib/lib/ || true
                  # Copy dynamic TDLib DLL and its dependencies
                  cp -r tdlib-dynamic/bin/* tdlib/bin/ || true
              shell: bash
            - name: Save ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && always()
              uses: actions/cache/save@v4
              with:
                  path: .ccache/
                  key: ccache-windows-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}-${{ env.TDLIB_COMMIT }}
            - name: Copy OpenSSL and zlib libraries from vcpkg
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  if [[ "$RUNNER_ARCH" == "X64" ]]; then
                    VCPKG_TRIPLET_STATIC="x64-windows-static"
                    VCPKG_TRIPLET_DYNAMIC="x64-windows"
                  else
                    VCPKG_TRIPLET_STATIC="arm64-windows-static"
                    VCPKG_TRIPLET_DYNAMIC="arm64-windows"
                  fi
                  # Copy static libraries to lib/static subdirectory
                  cp ./td/vcpkg/installed/$VCPKG_TRIPLET_STATIC/lib/*.lib ./td/tdlib/lib/static/ 2>/dev/null || true
                  # Copy dynamic libraries (DLLs) from dynamic triplet
                  cp ./td/vcpkg/installed/$VCPKG_TRIPLET_DYNAMIC/bin/*.dll ./td/tdlib/bin/ 2>/dev/null || true
              shell: bash
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: ./td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true

    build-android:
        strategy:
            fail-fast: false
            matrix:
                abi: [aarch64, x86_64]
        runs-on: ubuntu-latest
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/tdlib
                  key: tdlib-${{ env.TDLIB_VERSION }}-android-${{ matrix.abi }}
            - name: Restore ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              uses: actions/cache/restore@v4
              with:
                  path: .ccache/
                  key: ccache-android-${{ matrix.abi }}-${{ env.TDLIB_COMMIT }}
                  restore-keys: |
                      ccache-android-${{ matrix.abi }}-
            - name: Setup Android NDK
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  # Install NDK r27d (27.3.13750724) for reproducible builds
                  echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.3.13750724"
                  echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> $GITHUB_ENV
                  echo "ANDROID_API=29" >> $GITHUB_ENV
                  echo "NDK_TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
                  # echo "NDK_CC=${{ matrix.abi }}-linux-android$ANDROID_API-clang" >> $GITHUB_ENV
                  case "${{ matrix.abi }}" in
                    aarch64)
                      echo "OPENSSL_TARGET=android-arm64" >> $GITHUB_ENV
                      echo "ANDROID_ABI=arm64-v8a" >> $GITHUB_ENV
                      ;;
                    x86_64)
                      echo "OPENSSL_TARGET=android-x86_64" >> $GITHUB_ENV
                      echo "ANDROID_ABI=x86_64" >> $GITHUB_ENV
                      ;;
                  esac
            - name: Build static openssl for Android
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  wget -q https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz
                  tar -xzf openssl-${{ env.OPENSSL_VERSION }}.tar.gz
                  cd openssl-${{ env.OPENSSL_VERSION }}
                  export PATH=$NDK_TOOLCHAIN/bin:$PATH
                  ./Configure $OPENSSL_TARGET no-shared no-tests \
                    --prefix=$(pwd)/openssl-install
                  make -j$(nproc)
                  make install_sw
                  echo "OPENSSL_ROOT_DIR=$(pwd)/openssl-install" >> $GITHUB_ENV
            # NDK included zlib
            # - name: Build static zlib for Android
            #   if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
            #   run: |
            #       wget -q https://github.com/madler/zlib/archive/refs/tags/v${{ env.ZLIB_VERSION }}.tar.gz -O zlib-${{ env.ZLIB_VERSION }}.tar.gz
            #       tar -xzf zlib-${{ env.ZLIB_VERSION }}.tar.gz
            #       cd zlib-${{ env.ZLIB_VERSION }}
            #       CC=$NDK_TOOLCHAIN/bin/$NDK_CC ./configure --static --prefix=$(pwd)/zlib-install
            #       make -j$(nproc)
            #       make install
            #       echo "ZLIB_ROOT=$(pwd)/zlib-install" >> $GITHUB_ENV
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              env:
                  CCACHE_DIR: ${{ github.workspace }}/.ccache
                  CCACHE_MAXSIZE: 512M
              run: |
                  sudo apt-get update
                  sudo apt-get -y upgrade
                  sudo apt-get install make git zlib1g-dev libssl-dev gperf php-cli cmake ninja-build ccache
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  # Generate auto-generated files using native host build before cross-compiling
                  mkdir native_build
                  cd native_build
                  env -u OPENSSL_ROOT_DIR cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
                  cmake --build . --target prepare_cross_compiling --parallel
                  cd ..
                  rm -rf build
                  mkdir build
                  cd build
                  cmake -G Ninja -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
                    -DANDROID_ABI=$ANDROID_ABI \
                    -DANDROID_PLATFORM=android-$ANDROID_API \
                    -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR \
                    -DOPENSSL_INCLUDE_DIR=$OPENSSL_ROOT_DIR/include \
                    -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_ROOT_DIR/lib/libcrypto.a \
                    -DOPENSSL_SSL_LIBRARY=$OPENSSL_ROOT_DIR/lib/libssl.a \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                    ..
                  cmake --build . --target install --parallel
            - name: Copy OpenSSL and zlib static libraries
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  mkdir -p ./td/tdlib/lib
                  cp $OPENSSL_ROOT_DIR/lib/libssl.a ./td/tdlib/lib/
                  cp $OPENSSL_ROOT_DIR/lib/libcrypto.a ./td/tdlib/lib/
                  # cp $ZLIB_ROOT/lib/libz.a ./td/tdlib/lib/
                  cp $NDK_TOOLCHAIN/sysroot/usr/lib/${{ matrix.abi }}-linux-android/libz.a ./td/tdlib/lib/
            - name: Save ccache
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && always()
              uses: actions/cache/save@v4
              with:
                  path: .ccache/
                  key: ccache-android-${{ matrix.abi }}-${{ env.TDLIB_COMMIT }}
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: td/tdlib
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true
