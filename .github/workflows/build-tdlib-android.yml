name: Build TDLib Android

on:
    workflow_dispatch:
    workflow_call:

env:
    TDLIB_VERSION: "1.8.61"
    TDLIB_COMMIT: 6d509061574d684117f74133056aa43df89022fc
    OPENSSL_VERSION: "3.0.16"
    ZLIB_VERSION: "1.3.1"

jobs:
    build-android:
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
        runs-on: ubuntu-latest
        steps:
            - name: Restore cache TDLib
              id: cache-tdlib-restore
              uses: actions/cache/restore@v4
              with:
                  path: td/
                  key: tdlib-${{ env.TDLIB_VERSION }}-android-${{ matrix.abi }}
            - name: Setup Android NDK
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  # Install NDK r26c (26.3.11579264) for reproducible builds
                  echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"
                  echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV
            - name: Install dependencies
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y make git gperf php-cli cmake wget
            - name: Set ABI environment variables
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  case "${{ matrix.abi }}" in
                    arm64-v8a)
                      echo "OPENSSL_TARGET=android-arm64" >> $GITHUB_ENV
                      echo "NDK_CC=aarch64-linux-android21-clang" >> $GITHUB_ENV
                      ;;
                    armeabi-v7a)
                      echo "OPENSSL_TARGET=android-arm" >> $GITHUB_ENV
                      echo "NDK_CC=armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
                      ;;
                    x86_64)
                      echo "OPENSSL_TARGET=android-x86_64" >> $GITHUB_ENV
                      echo "NDK_CC=x86_64-linux-android21-clang" >> $GITHUB_ENV
                      ;;
                    x86)
                      echo "OPENSSL_TARGET=android-x86" >> $GITHUB_ENV
                      echo "NDK_CC=i686-linux-android21-clang" >> $GITHUB_ENV
                      ;;
                  esac
            - name: Build OpenSSL for Android
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  NDK_TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
                  export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
                  export PATH=$NDK_TOOLCHAIN/bin:$PATH
                  wget -q https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz
                  tar -xzf openssl-${{ env.OPENSSL_VERSION }}.tar.gz
                  cd openssl-${{ env.OPENSSL_VERSION }}
                  ./Configure $OPENSSL_TARGET -D__ANDROID_API__=21 no-shared no-tests \
                    --prefix=$(pwd)/openssl-install
                  make -j$(nproc)
                  make install_sw
                  echo "OPENSSL_ROOT_DIR=$(pwd)/openssl-install" >> $GITHUB_ENV
            - name: Build zlib for Android
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  NDK_TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
                  wget -q https://zlib.net/zlib-${{ env.ZLIB_VERSION }}.tar.gz
                  tar -xzf zlib-${{ env.ZLIB_VERSION }}.tar.gz
                  cd zlib-${{ env.ZLIB_VERSION }}
                  CC=$NDK_TOOLCHAIN/bin/$NDK_CC ./configure --static --prefix=$(pwd)/zlib-install
                  make -j$(nproc)
                  make install
                  echo "ZLIB_ROOT=$(pwd)/zlib-install" >> $GITHUB_ENV
            - name: Build TDLib
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  git clone https://github.com/tdlib/td.git
                  cd td
                  git checkout $TDLIB_COMMIT
                  rm -rf build
                  mkdir build
                  cd build
                  cmake \
                    -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                    -DANDROID_ABI=${{ matrix.abi }} \
                    -DANDROID_PLATFORM=android-21 \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DTD_ENABLE_JNI=ON \
                    -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR \
                    -DZLIB_ROOT=$ZLIB_ROOT \
                    -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
                    ..
                  cmake --build . --target install
            - name: Copy OpenSSL and zlib static libraries
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              run: |
                  mkdir -p ./td/tdlib/lib
                  cp $OPENSSL_ROOT_DIR/lib/libssl.a ./td/tdlib/lib/
                  cp $OPENSSL_ROOT_DIR/lib/libcrypto.a ./td/tdlib/lib/
                  cp $ZLIB_ROOT/lib/libz.a ./td/tdlib/lib/
            - name: Save cache TDLib
              uses: actions/cache/save@v4
              if: steps.cache-tdlib-restore.outputs.cache-hit != 'true'
              with:
                  path: td/
                  key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}
                  path: ./td/tdlib/
                  overwrite: true
